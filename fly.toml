# Fly.io — deploy from this directory: fly launch / fly deploy
# Docs: https://fly.io/docs/languages-and-frameworks/dockerfile/

app = "jarir-recommendation-pilot"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
